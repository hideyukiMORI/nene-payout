name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (composer check)
    runs-on: ubuntu-latest
    steps:
      # NENE2 is consumed via a Composer path repository (`../NENE2`), so it must
      # sit as a sibling of this repo on the runner. Both repos are public.
      - name: Checkout nene-payout
        uses: actions/checkout@v7
        with:
          path: nene-payout

      - name: Checkout NENE2 (path dependency)
        uses: actions/checkout@v7
        with:
          repository: hideyukiMORI/NENE2
          ref: main
          path: NENE2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl, dom, xml, curl, pdo, pdo_mysql, bcmath
          coverage: none
          tools: composer:v2

      - name: Cache Composer packages
        uses: actions/cache@v6
        with:
          path: nene-payout/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('nene-payout/composer.json') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install dependencies
        working-directory: nene-payout
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run checks
        working-directory: nene-payout
        run: composer check

  frontend:
    name: Frontend (npm run check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

  secret-scan:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
