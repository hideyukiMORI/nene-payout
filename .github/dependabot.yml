version: 2
updates:
  # Backend PHP dependencies (Composer). NENE2 itself is a path dependency and
  # is not tracked here.
  - package-ecosystem: composer
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  # Frontend JS dependencies (npm).
  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # Fleet policy: @types/* track the engines Node range, not npm latest.
      # engines.node is ">=22 <25", so @types/node major bumps (which type a
      # Node major the project does not support) are ignored; only ^22
      # minor/patch is tracked. A major that types Node 25+ passes type-check
      # but silently hides Node 23-24-absent APIs (silent drift) with zero
      # benefit for a strict-conventions repo. Revisit when engines widens.
      # Reference: #128 (declined @types/node 22 -> 26).
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      # Toolchain policy: typescript major is gated by typescript-eslint, not us.
      # TS 7.0 (native port) is npm "latest", but every @typescript-eslint/*
      # package still pins peer typescript ">=4.8.4 <6.1.0" (8.64.0 stable and
      # canary alike; no v9+ exists yet), so TS >=6.1 has zero tooling support.
      # typescript-eslint is owned by @hideyukimori/nene2-standards (pins
      # typescript-eslint ^8.35.0), so Payout cannot raise it alone. A forced
      # install (--legacy-peer-deps) only destabilises type-aware lint under
      # --max-warnings 0 with no upside. Track ^5 minor/patch only.
      # Lift this when typescript-eslint ships a TS 6.1+ peer AND nene2-standards
      # adopts it, then re-verify in one batch. Reference: #206 (declined
      # typescript 5.9.3 -> 7.0.2), #210.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # GitHub Actions used by CI workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci(deps)"
