version: 2
updates:
  # Backend PHP dependencies (Composer). NENE2 itself is a path dependency and
  # is not tracked here.
  - package-ecosystem: composer
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  # Frontend JS dependencies (npm).
  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # Fleet policy: @types/* track the engines Node range, not npm latest.
      # engines.node is ">=22 <25", so @types/node major bumps (which type a
      # Node major the project does not support) are ignored; only ^22
      # minor/patch is tracked. A major that types Node 25+ passes type-check
      # but silently hides Node 23-24-absent APIs (silent drift) with zero
      # benefit for a strict-conventions repo. Revisit when engines widens.
      # Reference: #128 (declined @types/node 22 -> 26).
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  # GitHub Actions used by CI workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci(deps)"
